<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Study on You</title>
<style>
  :root {
    --blue: #4A90E2;
    --blue-dark: #2C6FC7;
    --green: #27AE60;
    --red: #E74C3C;
    --yellow: #F39C12;
    --purple: #8E44AD;
    --orange: #E67E22;
    --bg: #F5F7FA;
    --card: #FFFFFF;
    --text: #2C3E50;
    --text-sub: #7F8C8D;
    --border: #E0E6ED;
    --radius: 14px;
    --shadow: 0 2px 12px rgba(0,0,0,0.08);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body { font-family: -apple-system, 'Hiragino Sans', 'Noto Sans JP', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

  /* ===== 画面共通 ===== */
  .screen { display: none; min-height: 100vh; padding-bottom: 80px; }
  .screen.active { display: block; }

  /* ===== ヘッダー ===== */
  .header {
    background: var(--blue);
    color: #fff;
    padding: 16px 20px 14px;
    position: sticky; top: 0; z-index: 100;
    display: flex; align-items: center; gap: 12px;
  }
  .header h1 { font-size: 18px; font-weight: 700; letter-spacing: 0.5px; flex: 1; }
  .header .back-btn {
    background: rgba(255,255,255,0.2);
    border: none; border-radius: 8px;
    color: #fff; font-size: 14px;
    padding: 6px 12px; cursor: pointer;
  }
  .header .user-badge {
    background: rgba(255,255,255,0.25);
    border-radius: 20px; padding: 4px 12px;
    font-size: 13px; font-weight: 600;
  }

  /* ===== ボトムナビ ===== */
  .bottom-nav {
    position: fixed; bottom: 0; left: 0; right: 0;
    background: #fff;
    border-top: 1px solid var(--border);
    display: flex;
    z-index: 200;
    padding-bottom: env(safe-area-inset-bottom);
  }
  .nav-item {
    flex: 1; display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 10px 4px 8px;
    cursor: pointer;
    border: none; background: none;
    color: var(--text-sub); font-size: 10px; gap: 4px;
    text-decoration: none;
  }
  .nav-item.active { color: var(--blue); }
  .nav-item svg { width: 24px; height: 24px; }

  /* ===== ログイン画面 ===== */
  #screen-login {
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    min-height: 100vh; padding: 40px 24px;
  }
  .login-logo {
    font-size: 32px; font-weight: 800;
    color: var(--blue); margin-bottom: 6px;
    letter-spacing: -0.5px;
  }
  .login-sub { color: var(--text-sub); font-size: 14px; margin-bottom: 40px; }
  .login-card {
    background: var(--card); border-radius: var(--radius);
    padding: 28px 24px; width: 100%; max-width: 360px;
    box-shadow: var(--shadow);
  }
  .login-card h2 { font-size: 18px; margin-bottom: 20px; }
  .form-group { margin-bottom: 16px; }
  .form-group label { font-size: 13px; color: var(--text-sub); display: block; margin-bottom: 6px; }
  .form-group input {
    width: 100%; padding: 12px 14px;
    border: 1.5px solid var(--border); border-radius: 10px;
    font-size: 15px; outline: none;
    -webkit-appearance: none;
    transition: border 0.2s;
  }
  .form-group input:focus { border-color: var(--blue); }
  .btn-primary {
    width: 100%; padding: 14px;
    background: var(--blue); color: #fff;
    border: none; border-radius: 10px;
    font-size: 16px; font-weight: 700;
    cursor: pointer; margin-top: 8px;
  }
  .btn-primary:active { background: var(--blue-dark); }
  .login-switch { text-align: center; margin-top: 16px; font-size: 14px; color: var(--text-sub); }
  .login-switch span { color: var(--blue); font-weight: 600; cursor: pointer; }
  .guest-btn {
    margin-top: 16px; width: 100%; padding: 12px;
    background: transparent; border: 1.5px solid var(--border);
    border-radius: 10px; font-size: 14px; color: var(--text-sub);
    cursor: pointer;
  }
  .tab-btns { display: flex; margin-bottom: 20px; border-radius: 10px; overflow: hidden; border: 1.5px solid var(--border); }
  .tab-btn { flex: 1; padding: 10px; border: none; background: #fff; font-size: 14px; cursor: pointer; font-weight: 600; color: var(--text-sub); }
  .tab-btn.active { background: var(--blue); color: #fff; }

  /* ===== ホーム画面 ===== */
  .home-hero {
    background: linear-gradient(135deg, var(--blue) 0%, #6C63FF 100%);
    padding: 24px 20px 32px; color: #fff;
  }
  .home-hero .greeting { font-size: 14px; opacity: 0.85; margin-bottom: 4px; }
  .home-hero .name { font-size: 24px; font-weight: 800; margin-bottom: 16px; }
  .stats-row { display: flex; gap: 10px; }
  .stat-chip {
    background: rgba(255,255,255,0.2);
    border-radius: 10px; padding: 10px 14px; flex: 1; text-align: center;
  }
  .stat-chip .val { font-size: 22px; font-weight: 800; }
  .stat-chip .lbl { font-size: 11px; opacity: 0.85; margin-top: 2px; }

  .section-title { font-size: 16px; font-weight: 700; padding: 20px 20px 10px; }
  .subject-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; padding: 0 16px; }
  .subject-card {
    background: var(--card); border-radius: var(--radius);
    padding: 18px 16px; box-shadow: var(--shadow);
    cursor: pointer; border: none; text-align: left;
    position: relative; overflow: hidden;
  }
  .subject-card::before {
    content: ''; position: absolute; top: 0; left: 0; right: 0;
    height: 4px;
  }
  .subject-card.math::before { background: var(--blue); }
  .subject-card.english::before { background: var(--green); }
  .subject-card.japanese::before { background: var(--red); }
  .subject-card.science::before { background: var(--orange); }
  .subject-card.social::before { background: var(--purple); }
  .subject-card .s-icon { font-size: 28px; margin-bottom: 8px; }
  .subject-card .s-name { font-size: 15px; font-weight: 700; margin-bottom: 4px; }
  .subject-card .s-count { font-size: 12px; color: var(--text-sub); }
  .subject-card .s-progress {
    margin-top: 10px; height: 4px; background: var(--border);
    border-radius: 2px; overflow: hidden;
  }
  .subject-card .s-progress-bar { height: 100%; border-radius: 2px; }
  .subject-card.math .s-progress-bar { background: var(--blue); }
  .subject-card.english .s-progress-bar { background: var(--green); }
  .subject-card.japanese .s-progress-bar { background: var(--red); }
  .subject-card.science .s-progress-bar { background: var(--orange); }
  .subject-card.social .s-progress-bar { background: var(--purple); }

  /* ===== 問題画面 ===== */
  .quiz-progress-bar { height: 4px; background: var(--border); }
  .quiz-progress-fill { height: 100%; background: var(--blue); transition: width 0.3s; }
  .quiz-meta { display: flex; justify-content: space-between; align-items: center; padding: 12px 20px; font-size: 13px; color: var(--text-sub); }
  .quiz-body { padding: 20px; }
  .quiz-question { font-size: 18px; font-weight: 600; line-height: 1.6; margin-bottom: 24px; }
  .choice-list { display: flex; flex-direction: column; gap: 12px; }
  .choice-btn {
    width: 100%; padding: 16px;
    background: var(--card); border: 2px solid var(--border);
    border-radius: var(--radius); font-size: 15px;
    text-align: left; cursor: pointer; font-family: inherit;
    transition: all 0.15s; line-height: 1.5;
  }
  .choice-btn:active { transform: scale(0.98); }
  .choice-btn.correct { border-color: var(--green); background: #E8F8EF; color: #1A7A3F; }
  .choice-btn.wrong { border-color: var(--red); background: #FEF0EF; color: #C0392B; }
  .choice-btn.disabled { cursor: default; }
  .explanation-box {
    margin-top: 20px; padding: 16px;
    background: #EEF4FF; border-radius: var(--radius);
    border-left: 4px solid var(--blue);
    font-size: 14px; line-height: 1.6; color: var(--text);
  }
  .explanation-box .ex-label { font-weight: 700; color: var(--blue); margin-bottom: 6px; font-size: 13px; }
  .next-btn {
    width: calc(100% - 40px); margin: 20px 20px 0;
    padding: 16px; background: var(--blue); color: #fff;
    border: none; border-radius: var(--radius);
    font-size: 16px; font-weight: 700; cursor: pointer;
  }

  /* ===== 結果画面 ===== */
  .result-body { padding: 30px 20px; text-align: center; }
  .result-emoji { font-size: 72px; margin-bottom: 16px; }
  .result-score { font-size: 48px; font-weight: 800; color: var(--blue); }
  .result-label { font-size: 16px; color: var(--text-sub); margin-bottom: 24px; }
  .result-msg { font-size: 18px; font-weight: 600; margin-bottom: 32px; line-height: 1.5; }
  .result-actions { display: flex; flex-direction: column; gap: 12px; }
  .btn-secondary {
    padding: 14px; border: 2px solid var(--blue);
    border-radius: var(--radius); background: #fff;
    color: var(--blue); font-size: 15px; font-weight: 700; cursor: pointer;
  }

  /* ===== ランキング画面 ===== */
  .rank-list { padding: 16px; display: flex; flex-direction: column; gap: 10px; }
  .rank-item {
    background: var(--card); border-radius: var(--radius);
    padding: 14px 16px; display: flex; align-items: center;
    gap: 14px; box-shadow: var(--shadow);
  }
  .rank-num { font-size: 20px; font-weight: 800; width: 30px; text-align: center; }
  .rank-num.gold { color: #F1C40F; }
  .rank-num.silver { color: #BDC3C7; }
  .rank-num.bronze { color: #CA6F1E; }
  .rank-avatar {
    width: 44px; height: 44px; border-radius: 50%;
    background: var(--blue); color: #fff;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px; font-weight: 700;
  }
  .rank-info { flex: 1; }
  .rank-name { font-size: 15px; font-weight: 700; }
  .rank-detail { font-size: 12px; color: var(--text-sub); margin-top: 2px; }
  .rank-pt { font-size: 18px; font-weight: 800; color: var(--blue); }

  /* ===== プロフィール画面 ===== */
  .profile-hero {
    background: linear-gradient(135deg, var(--blue) 0%, #6C63FF 100%);
    padding: 30px 20px; text-align: center; color: #fff;
  }
  .profile-avatar {
    width: 72px; height: 72px; border-radius: 50%;
    background: rgba(255,255,255,0.3);
    display: flex; align-items: center; justify-content: center;
    font-size: 30px; font-weight: 800; margin: 0 auto 12px;
    color: #fff;
  }
  .profile-name { font-size: 20px; font-weight: 800; }
  .profile-grade { font-size: 14px; opacity: 0.85; margin-top: 4px; }
  .profile-stats { display: flex; justify-content: center; gap: 0; margin-top: 20px; }
  .p-stat { flex: 1; text-align: center; border-right: 1px solid rgba(255,255,255,0.3); }
  .p-stat:last-child { border-right: none; }
  .p-stat .val { font-size: 22px; font-weight: 800; }
  .p-stat .lbl { font-size: 11px; opacity: 0.8; margin-top: 2px; }
  .profile-section { padding: 16px; display: flex; flex-direction: column; gap: 10px; }
  .profile-row {
    background: var(--card); border-radius: var(--radius);
    padding: 16px; display: flex; align-items: center;
    justify-content: space-between; box-shadow: var(--shadow);
  }
  .profile-row .p-label { font-size: 14px; color: var(--text-sub); }
  .profile-row .p-value { font-size: 15px; font-weight: 600; }

  /* ===== エラー/トースト ===== */
  .toast {
    position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%);
    background: #2C3E50; color: #fff; padding: 12px 20px;
    border-radius: 30px; font-size: 14px; font-weight: 600;
    opacity: 0; transition: opacity 0.3s; z-index: 999; white-space: nowrap;
  }
  .toast.show { opacity: 1; }
</style>
</head>
<body>

<!-- ===== ログイン画面 ===== -->
<div id="screen-login" class="screen active">
  <div class="login-logo">Study on You</div>
  <p class="login-sub">あなたに合った勉強を</p>
  <div class="login-card">
    <div class="tab-btns">
      <button class="tab-btn active" onclick="switchLoginTab('login')">ログイン</button>
      <button class="tab-btn" onclick="switchLoginTab('register')">新規登録</button>
    </div>

    <!-- ログインフォーム -->
    <div id="login-form">
      <div class="form-group">
        <label>ユーザーネーム</label>
        <input type="text" id="login-username" placeholder="username" autocomplete="username">
      </div>
      <div class="form-group">
        <label>パスワード</label>
        <input type="password" id="login-password" placeholder="••••••••" autocomplete="current-password">
      </div>
      <button class="btn-primary" onclick="doLogin()">ログイン</button>
      <button class="guest-btn" onclick="doGuest()">ゲストとして試してみる</button>
    </div>

    <!-- 登録フォーム -->
    <div id="register-form" style="display:none;">
      <div class="form-group">
        <label>氏名</label>
        <input type="text" id="reg-name" placeholder="山田 太郎">
      </div>
      <div class="form-group">
        <label>ユーザーネーム</label>
        <input type="text" id="reg-username" placeholder="yamada_taro">
      </div>
      <div class="form-group">
        <label>パスワード（8文字以上）</label>
        <input type="password" id="reg-password" placeholder="••••••••" autocomplete="new-password">
      </div>
      <div class="form-group">
        <label>学年</label>
        <select id="reg-grade" style="width:100%;padding:12px 14px;border:1.5px solid var(--border);border-radius:10px;font-size:15px;background:#fff;-webkit-appearance:none;">
          <option value="">選択してください</option>
          <option>中学1年</option>
          <option>中学2年</option>
          <option>中学3年</option>
          <option>高校1年</option>
          <option>高校2年</option>
          <option>高校3年</option>
        </select>
      </div>
      <button class="btn-primary" onclick="doRegister()">アカウントを作成</button>
    </div>
  </div>
</div>

<!-- ===== ホーム画面 ===== -->
<div id="screen-home" class="screen">
  <div class="home-hero">
    <div class="greeting">おかえり👋</div>
    <div class="name" id="home-username">ゲスト さん</div>
    <div class="stats-row">
      <div class="stat-chip">
        <div class="val" id="home-total">0</div>
        <div class="lbl">解いた問題</div>
      </div>
      <div class="stat-chip">
        <div class="val" id="home-correct-rate">--%</div>
        <div class="lbl">正答率</div>
      </div>
      <div class="stat-chip">
        <div class="val" id="home-points">0</div>
        <div class="lbl">ポイント</div>
      </div>
    </div>
  </div>
  <div class="section-title">教科を選ぶ</div>
  <div class="subject-grid">
    <button class="subject-card math" onclick="startSubject('math')">
      <div class="s-icon">📐</div>
      <div class="s-name">数学</div>
      <div class="s-count" id="cnt-math">10問</div>
      <div class="s-progress"><div class="s-progress-bar" id="prog-math" style="width:0%"></div></div>
    </button>
    <button class="subject-card english" onclick="startSubject('english')">
      <div class="s-icon">🔤</div>
      <div class="s-name">英語</div>
      <div class="s-count" id="cnt-english">10問</div>
      <div class="s-progress"><div class="s-progress-bar" id="prog-english" style="width:0%"></div></div>
    </button>
    <button class="subject-card japanese" onclick="startSubject('japanese')">
      <div class="s-icon">📖</div>
      <div class="s-name">国語</div>
      <div class="s-count" id="cnt-japanese">10問</div>
      <div class="s-progress"><div class="s-progress-bar" id="prog-japanese" style="width:0%"></div></div>
    </button>
    <button class="subject-card science" onclick="startSubject('science')">
      <div class="s-icon">🔬</div>
      <div class="s-name">理科</div>
      <div class="s-count" id="cnt-science">10問</div>
      <div class="s-progress"><div class="s-progress-bar" id="prog-science" style="width:0%"></div></div>
    </button>
    <button class="subject-card social" onclick="startSubject('social')" style="grid-column: span 2;">
      <div class="s-icon">🌍</div>
      <div class="s-name">社会</div>
      <div class="s-count" id="cnt-social">10問</div>
      <div class="s-progress"><div class="s-progress-bar" id="prog-social" style="width:0%"></div></div>
    </button>
  </div>
</div>

<!-- ===== 問題画面 ===== -->
<div id="screen-quiz" class="screen">
  <div class="header">
    <button class="back-btn" onclick="goBack()">← 戻る</button>
    <h1 id="quiz-subject-title">数学</h1>
  </div>
  <div class="quiz-progress-bar"><div class="quiz-progress-fill" id="quiz-progress-fill"></div></div>
  <div class="quiz-meta">
    <span id="quiz-meta-num">1 / 10</span>
    <span id="quiz-meta-score">正解: 0問</span>
  </div>
  <div class="quiz-body">
    <div class="quiz-question" id="quiz-question"></div>
    <div class="choice-list" id="choice-list"></div>
    <div class="explanation-box" id="explanation-box" style="display:none;">
      <div class="ex-label">💡 解説</div>
      <div id="explanation-text"></div>
    </div>
  </div>
  <button class="next-btn" id="next-btn" style="display:none;" onclick="nextQuestion()">次の問題へ →</button>
</div>

<!-- ===== 結果画面 ===== -->
<div id="screen-result" class="screen">
  <div class="header"><h1>結果</h1></div>
  <div class="result-body">
    <div class="result-emoji" id="result-emoji">🎉</div>
    <div class="result-score" id="result-score">8 / 10</div>
    <div class="result-label">正解数</div>
    <div class="result-msg" id="result-msg">すばらしい！</div>
    <div class="result-actions">
      <button class="btn-primary" onclick="retryQuiz()">もう一度挑戦する</button>
      <button class="btn-secondary" onclick="showScreen('home')">ホームに戻る</button>
    </div>
  </div>
</div>

<!-- ===== ランキング画面 ===== -->
<div id="screen-ranking" class="screen">
  <div class="header"><h1>ランキング</h1></div>
  <div class="rank-list" id="rank-list"></div>
</div>

<!-- ===== プロフィール画面 ===== -->
<div id="screen-profile" class="screen">
  <div class="profile-hero">
    <div class="profile-avatar" id="profile-avatar">G</div>
    <div class="profile-name" id="profile-name">ゲスト</div>
    <div class="profile-grade" id="profile-grade">学年未設定</div>
    <div class="profile-stats">
      <div class="p-stat">
        <div class="val" id="p-total">0</div>
        <div class="lbl">解いた問題</div>
      </div>
      <div class="p-stat">
        <div class="val" id="p-rate">--%</div>
        <div class="lbl">正答率</div>
      </div>
      <div class="p-stat">
        <div class="val" id="p-points">0</div>
        <div class="lbl">ポイント</div>
      </div>
    </div>
  </div>
  <div class="profile-section">
    <div class="profile-row">
      <span class="p-label">ユーザーネーム</span>
      <span class="p-value" id="p-username">guest</span>
    </div>
    <div class="profile-row">
      <span class="p-label">学年</span>
      <span class="p-value" id="p-grade-row">未設定</span>
    </div>
    <div class="profile-row" style="cursor:pointer;" onclick="doLogout()">
      <span class="p-label" style="color:var(--red);">ログアウト</span>
      <span style="color:var(--text-sub);">→</span>
    </div>
  </div>
</div>

<!-- ===== ボトムナビ ===== -->
<nav class="bottom-nav" id="bottom-nav" style="display:none;">
  <button class="nav-item active" id="nav-home" onclick="showScreen('home')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9L12 2l9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9,22 9,12 15,12 15,22"/></svg>
    ホーム
  </button>
  <button class="nav-item" id="nav-ranking" onclick="showScreen('ranking')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23,6 13.5,15.5 8.5,10.5 1,18"/><polyline points="17,6 23,6 23,12"/></svg>
    ランキング
  </button>
  <button class="nav-item" id="nav-profile" onclick="showScreen('profile')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
    プロフィール
  </button>
</nav>

<div class="toast" id="toast"></div>

<script>
// ===================================================
// 問題データ（fetch不使用・Safari対応）
// ===================================================
var QUESTIONS = {
  math: [
    { q:"3x + 6 = 18 のとき、x の値は？", choices:["x = 4","x = 3","x = 6","x = 2"], answer:0, exp:"3x = 18 - 6 = 12、x = 12 ÷ 3 = 4" },
    { q:"(-3)² の値は？", choices:["9","-9","6","-6"], answer:0, exp:"(-3)² = (-3) × (-3) = 9。マイナス×マイナスはプラスになります。" },
    { q:"2x - 5 = 9 のとき、x の値は？", choices:["x = 7","x = 5","x = 4","x = 2"], answer:0, exp:"2x = 9 + 5 = 14、x = 14 ÷ 2 = 7" },

var SUBJECT_NAMES = { math:"数学", english:"英語", japanese:"国語", science:"理科", social:"社会" };

// ===================================================
// アプリ状態
// ===================================================
var state = {
  user: null,
  currentSubject: null,
  currentQuestions: [],
  currentIndex: 0,
  correctCount: 0,
  answered: false
};

// ローカルストレージからユーザー一覧取得
function getUsers() {
  try { return JSON.parse(localStorage.getItem('soy_users') || '{}'); } catch(e) { return {}; }
}
function saveUsers(users) {
  localStorage.setItem('soy_users', JSON.stringify(users));
}
function getCurrentUser() {
  try { return JSON.parse(localStorage.getItem('soy_current') || 'null'); } catch(e) { return null; }
}
function saveCurrentUser(user) {
  localStorage.setItem('soy_current', JSON.stringify(user));
}

// ===================================================
// ログイン・登録
// ===================================================
function switchLoginTab(tab) {
  var btns = document.querySelectorAll('.tab-btn');
  if (tab === 'login') {
    btns[0].classList.add('active'); btns[1].classList.remove('active');
    document.getElementById('login-form').style.display = 'block';
    document.getElementById('register-form').style.display = 'none';
  } else {
    btns[1].classList.add('active'); btns[0].classList.remove('active');
    document.getElementById('login-form').style.display = 'none';
    document.getElementById('register-form').style.display = 'block';
  }
}

function doLogin() {
  var username = document.getElementById('login-username').value.trim();
  var password = document.getElementById('login-password').value;
  if (!username || !password) { showToast('ユーザーネームとパスワードを入力してください'); return; }
  var users = getUsers();
  if (!users[username] || users[username].password !== password) {
    showToast('ユーザーネームまたはパスワードが違います'); return;
  }
  state.user = users[username];
  saveCurrentUser(state.user);
  enterApp();
}

function doRegister() {
  var name = document.getElementById('reg-name').value.trim();
  var username = document.getElementById('reg-username').value.trim();
  var password = document.getElementById('reg-password').value;
  var grade = document.getElementById('reg-grade').value;
  if (!name || !username || !password || !grade) { showToast('すべての項目を入力してください'); return; }
  if (password.length < 8) { showToast('パスワードは8文字以上にしてください'); return; }
  var users = getUsers();
  if (users[username]) { showToast('そのユーザーネームは既に使われています'); return; }
  var newUser = { name, username, password, grade, points: 0, totalAnswered: 0, totalCorrect: 0, history: {} };
  users[username] = newUser;
  saveUsers(users);
  state.user = newUser;
  saveCurrentUser(state.user);
  enterApp();
}

function doGuest() {
  state.user = { name:'ゲスト', username:'guest', grade:'', points:0, totalAnswered:0, totalCorrect:0, history:{} };
  enterApp();
}

function doLogout() {
  if (!confirm('ログアウトしますか？')) return;
  state.user = null;
  localStorage.removeItem('soy_current');
  showScreen('login');
}

function enterApp() {
  updateHomeStats();
  updateProfile();
  buildRanking();
  showScreen('home');
  document.getElementById('bottom-nav').style.display = 'flex';
}

// ===================================================
// 画面遷移
// ===================================================
function showScreen(name) {
  document.querySelectorAll('.screen').forEach(function(s){ s.classList.remove('active'); });
  var s = document.getElementById('screen-' + name);
  if (s) { s.classList.add('active'); s.scrollTop = 0; window.scrollTo(0,0); }

  var navMap = { home:'nav-home', ranking:'nav-ranking', profile:'nav-profile' };
  document.querySelectorAll('.nav-item').forEach(function(n){ n.classList.remove('active'); });
  if (navMap[name]) {
    var el = document.getElementById(navMap[name]);
    if (el) el.classList.add('active');
  }

  if (name === 'login') {
    document.getElementById('bottom-nav').style.display = 'none';
  } else {
    document.getElementById('bottom-nav').style.display = 'flex';
  }
}

function goBack() {
  showScreen('home');
}

// ===================================================
// ホーム統計更新
// ===================================================
function updateHomeStats() {
  var u = state.user;
  document.getElementById('home-username').textContent = (u.name || u.username) + ' さん';
  document.getElementById('home-total').textContent = u.totalAnswered || 0;
  var rate = u.totalAnswered > 0 ? Math.round(u.totalCorrect / u.totalAnswered * 100) : '--';
  document.getElementById('home-correct-rate').textContent = (rate === '--') ? '--%' : rate + '%';
  document.getElementById('home-points').textContent = u.points || 0;

  var subjects = ['math','english','japanese','science','social'];
  subjects.forEach(function(s){
    var h = (u.history && u.history[s]) || { answered: 0, correct: 0 };
    var total = QUESTIONS[s].length;
    var pct = total > 0 ? Math.round(h.answered / total * 100) : 0;
    document.getElementById('prog-' + s).style.width = pct + '%';
    document.getElementById('cnt-' + s).textContent = total + '問';
  });
}

// ===================================================
// 問題開始
// ===================================================
function startSubject(subject) {
  state.currentSubject = subject;
  state.currentQuestions = shuffle(QUESTIONS[subject].slice());
  state.currentIndex = 0;
  state.correctCount = 0;
  state.answered = false;
  document.getElementById('quiz-subject-title').textContent = SUBJECT_NAMES[subject];
  showScreen('quiz');
  renderQuestion();
}

function shuffle(arr) {
  for (var i = arr.length - 1; i > 0; i--) {
    var j = Math.floor(Math.random() * (i + 1));
    var tmp = arr[i]; arr[i] = arr[j]; arr[j] = tmp;
  }
  return arr;
}

function renderQuestion() {
  var q = state.currentQuestions[state.currentIndex];
  var total = state.currentQuestions.length;
  var idx = state.currentIndex;

  document.getElementById('quiz-progress-fill').style.width = ((idx / total) * 100) + '%';
  document.getElementById('quiz-meta-num').textContent = (idx + 1) + ' / ' + total;
  document.getElementById('quiz-meta-score').textContent = '正解: ' + state.correctCount + '問';
  document.getElementById('quiz-question').textContent = q.q;

  var list = document.getElementById('choice-list');
  list.innerHTML = '';
  q.choices.forEach(function(c, i){
    var btn = document.createElement('button');
    btn.className = 'choice-btn';
    btn.textContent = c;
    btn.onclick = function(){ if (!state.answered) selectAnswer(i, q.answer, q.exp); };
    list.appendChild(btn);
  });

  document.getElementById('explanation-box').style.display = 'none';
  document.getElementById('next-btn').style.display = 'none';
  state.answered = false;
}

function selectAnswer(selected, correct, exp) {
  state.answered = true;
  var btns = document.querySelectorAll('.choice-btn');
  btns.forEach(function(b, i){
    b.classList.add('disabled');
    if (i === correct) b.classList.add('correct');
    else if (i === selected) b.classList.add('wrong');
  });

  var isCorrect = (selected === correct);
  if (isCorrect) state.correctCount++;

  document.getElementById('explanation-text').textContent = exp;
  document.getElementById('explanation-box').style.display = 'block';

  var isLast = (state.currentIndex >= state.currentQuestions.length - 1);
  var nextBtn = document.getElementById('next-btn');
  nextBtn.style.display = 'block';
  nextBtn.textContent = isLast ? '結果を見る' : '次の問題へ →';

  saveProgress(isCorrect);
}

function nextQuestion() {
  state.currentIndex++;
  if (state.currentIndex >= state.currentQuestions.length) {
    showResult();
  } else {
    renderQuestion();
    window.scrollTo(0, 0);
  }
}

function saveProgress(isCorrect) {
  if (!state.user || state.user.username === 'guest') return;
  var u = state.user;
  u.totalAnswered = (u.totalAnswered || 0) + 1;
  if (isCorrect) {
    u.totalCorrect = (u.totalCorrect || 0) + 1;
    u.points = (u.points || 0) + 10;
  }
  if (!u.history) u.history = {};
  if (!u.history[state.currentSubject]) u.history[state.currentSubject] = { answered:0, correct:0 };
  u.history[state.currentSubject].answered++;
  if (isCorrect) u.history[state.currentSubject].correct++;

  var users = getUsers();
  users[u.username] = u;
  saveUsers(users);
  saveCurrentUser(u);
}

// ===================================================
// 結果表示
// ===================================================
function showResult() {
  var correct = state.correctCount;
  var total = state.currentQuestions.length;
  var pct = Math.round(correct / total * 100);

  document.getElementById('result-score').textContent = correct + ' / ' + total;

  var emoji, msg;
  if (pct >= 90) { emoji = '🏆'; msg = '完璧！すばらしい結果です！'; }
  else if (pct >= 70) { emoji = '🎉'; msg = 'よくできました！次も頑張ろう！'; }
  else if (pct >= 50) { emoji = '📚'; msg = 'もう少し！復習して再挑戦しよう！'; }
  else { emoji = '💪'; msg = '難しかったね。もう一度チャレンジ！'; }

  document.getElementById('result-emoji').textContent = emoji;
  document.getElementById('result-msg').textContent = msg;

  if (state.user && state.user.username !== 'guest') {
    var earned = correct * 10;
    document.getElementById('result-msg').textContent = msg + '\n+' + earned + ' ポイント獲得！';
  }

  updateHomeStats();
  updateProfile();
  buildRanking();
  showScreen('result');
}

function retryQuiz() {
  startSubject(state.currentSubject);
}

// ===================================================
// ランキング
// ===================================================
function buildRanking() {
  var users = getUsers();
  var list = Object.values(users).sort(function(a,b){ return (b.points||0) - (a.points||0); });
  // ゲストデモ用サンプルを追加
  var samples = [
    { name:'田中 さくら', username:'sakura', grade:'中学2年', points:680, totalAnswered:42, totalCorrect:37 },
    { name:'鈴木 けんた', username:'kenta', grade:'中学1年', points:520, totalAnswered:33, totalCorrect:26 },
    { name:'山田 あおい', username:'aoi', grade:'中学3年', points:910, totalAnswered:61, totalCorrect:55 }
  ];
  var combined = samples.concat(list).sort(function(a,b){ return (b.points||0) - (a.points||0); });

  var container = document.getElementById('rank-list');
  container.innerHTML = '';
  combined.slice(0,10).forEach(function(u, i){
    var numClass = i === 0 ? 'gold' : i === 1 ? 'silver' : i === 2 ? 'bronze' : '';
    var initials = (u.name || u.username).charAt(0).toUpperCase();
    var rate = u.totalAnswered > 0 ? Math.round((u.totalCorrect||0) / u.totalAnswered * 100) : 0;
    var isMe = state.user && state.user.username === u.username;
    container.innerHTML += '<div class="rank-item" style="' + (isMe ? 'border:2px solid var(--blue);' : '') + '">'
      + '<div class="rank-num ' + numClass + '">' + (i+1) + '</div>'
      + '<div class="rank-avatar">' + initials + '</div>'
      + '<div class="rank-info"><div class="rank-name">' + (u.name||u.username) + (isMe ? ' 👈 あなた' : '') + '</div>'
      + '<div class="rank-detail">' + (u.grade||'') + ' · 正答率 ' + rate + '%</div></div>'
      + '<div class="rank-pt">' + (u.points||0) + '<span style="font-size:12px;font-weight:400;color:var(--text-sub)"> pt</span></div>'
      + '</div>';
  });
}

// ===================================================
// プロフィール
// ===================================================
function updateProfile() {
  var u = state.user;
  if (!u) return;
  var initial = (u.name || u.username).charAt(0).toUpperCase();
  document.getElementById('profile-avatar').textContent = initial;
  document.getElementById('profile-name').textContent = u.name || u.username;
  document.getElementById('profile-grade').textContent = u.grade || '学年未設定';
  document.getElementById('p-username').textContent = u.username;
  document.getElementById('p-grade-row').textContent = u.grade || '未設定';
  document.getElementById('p-total').textContent = u.totalAnswered || 0;
  var rate = u.totalAnswered > 0 ? Math.round((u.totalCorrect||0) / u.totalAnswered * 100) : '--';
  document.getElementById('p-rate').textContent = (rate === '--') ? '--%' : rate + '%';
  document.getElementById('p-points').textContent = u.points || 0;
}

// ===================================================
// トースト
// ===================================================
function showToast(msg) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(function(){ t.classList.remove('show'); }, 2500);
}

// ===================================================
// 起動時チェック
// ===================================================
(function init(){
  var saved = getCurrentUser();
  if (saved) {
    state.user = saved;
    enterApp();
  }
})();
</script>
