<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>study-fune</title>
<style>
body{font-family:-apple-system,sans-serif;background:#f5f5f3;margin:0 0 60px;padding:0;}
.page{display:none;}.page.on{display:block;}
nav{position:fixed;bottom:0;left:0;right:0;height:56px;background:#fff;border-top:1px solid #e5e5e3;display:flex;}
.nb{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;border:none;background:none;cursor:pointer;font-family:inherit;color:#9A9A98;gap:2px;font-size:10px;font-weight:600;}
.nb.on{color:#378ADD;}
</style>
</head>
<body>

<div class="page on" id="p0">
  <div style="padding:1rem">
    <h2>ホーム</h2>
    <p>ここがホームです</p>
  </div>
</div>

<div class="page" id="p1">
  <div style="padding:1rem">
    <h2>問題</h2>
    <p>ここが問題ページです</p>
  </div>
</div>

<div class="page" id="p2">
  <div style="padding:1rem">
    <h2>マイページ</h2>
    <p>ここがマイページです</p>
  </div>
</div>

<div class="page" id="p3">
  <div style="padding:1rem">
    <h2>カレンダー</h2>
    <p>ここがカレンダーです</p>
  </div>
</div>

<div class="page" id="p4">
  <div style="padding:1rem">
    <h2>お知らせ</h2>
    <p>ここがお知らせです</p>
  </div>
</div>

<nav>
  <button class="nb on" id="n0" onclick="goTo(0)">ホーム</button>
  <button class="nb" id="n1" onclick="goTo(1)">問題</button>
  <button class="nb" id="n2" onclick="goTo(2)">マイページ</button>
  <button class="nb" id="n3" onclick="goTo(3)">カレンダー</button>
  <button class="nb" id="n4" onclick="goTo(4)">お知らせ</button>
</nav>

<script>
function goTo(i) {
  for (var j = 0; j < 5; j++) {
    var p = document.getElementById("p" + j);
    var n = document.getElementById("n" + j);
    if (p) p.classList[i === j ? "add" : "remove"]("on");
    if (n) n.classList[i === j ? "add" : "remove"]("on");
  }
  window.scrollTo(0, 0);
}
</script>
</body>
</html>
