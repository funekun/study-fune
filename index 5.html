<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>study-fune</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css">
<style>
:root{
  --bg:#F5F5F3;--sf:#fff;--sub:#F0F0EE;
  --bd:#E5E5E3;--bds:#CCCCCA;
  --tx:#1A1A18;--mt:#9A9A98;--sc:#666664;
  --ac:#185FA5;--acbg:#E6F1FB;--acm:#378ADD;
  --ok:#3B6D11;--okbg:#EAF3DE;
  --wn:#BA7517;--wnbg:#FAEEDA;--wndk:#633806;--wnmd:#854F0B;
  --ng:#A32D2D;--ngbg:#FCEBEB;
  --r:8px;--rl:12px;--nv:56px;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{width:100%;max-width:100%;overflow-x:hidden;font-family:-apple-system,BlinkMacSystemFont,'Hiragino Sans',sans-serif;background:var(--bg);color:var(--tx);}
.page{display:none;max-width:500px;margin:0 auto;padding:1.25rem 1rem calc(var(--nv) + 1.5rem);}
.page.on{display:block;}
nav{position:fixed;bottom:0;left:0;right:0;height:var(--nv);background:var(--sf);border-top:1px solid var(--bd);display:flex;z-index:100;}
.nb{flex:1;display:flex;align-items:center;justify-content:center;font-size:22px;color:var(--mt);border:none;background:none;cursor:pointer;}
.nb.on{color:var(--acm);}
.tb{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.25rem;}
.av{width:38px;height:38px;border-radius:50%;background:var(--acbg);color:var(--ac);font-size:13px;font-weight:600;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.pp{display:flex;align-items:center;gap:6px;background:var(--wnbg);border-radius:20px;padding:6px 14px;flex-shrink:0;}
.pn{font-size:20px;font-weight:600;color:var(--wndk);}
.pu{font-size:12px;color:var(--wnmd);}
.sl{font-size:11px;font-weight:600;color:var(--mt);letter-spacing:.06em;text-transform:uppercase;margin-bottom:10px;}
.tabs{display:flex;gap:6px;margin-bottom:1.25rem;overflow-x:auto;padding-bottom:2px;}
.tabs::-webkit-scrollbar{display:none;}
.tab{padding:7px 16px;border-radius:20px;border:1px solid var(--bd);background:var(--sf);font-size:13px;font-weight:600;color:var(--sc);cursor:pointer;white-space:nowrap;flex-shrink:0;}
.tab.on{background:var(--acm);color:#fff;border-color:var(--acm);}
.cr{background:var(--sf);border:1px solid var(--bd);border-radius:var(--rl);padding:12px 16px;margin-bottom:8px;display:flex;align-items:center;gap:12px;}
.ci{width:36px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;}
.cb{flex:1;min-width:0;}
.cn{font-size:14px;font-weight:600;margin-bottom:2px;}
.cm{font-size:12px;color:var(--mt);}
.cc{display:flex;align-items:center;gap:8px;flex-shrink:0;}
.cb2{width:30px;height:30px;border-radius:50%;border:1px solid var(--bd);background:var(--sf);font-size:18px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;padding:0;color:var(--tx);font-family:inherit;}
.cv{font-size:16px;font-weight:700;min-width:22px;text-align:center;}
.dr{display:flex;gap:6px;margin-bottom:1.25rem;}
.db{flex:1;padding:8px;font-size:13px;font-weight:600;border-radius:20px;border:1px solid var(--bd);background:var(--sf);cursor:pointer;color:var(--sc);font-family:inherit;}
.db.on{border-color:var(--acm);background:var(--acbg);color:var(--ac);}
.tw{background:var(--sf);border:1px solid var(--bd);border-radius:var(--rl);padding:12px 16px;margin-bottom:1.25rem;display:flex;align-items:center;justify-content:space-between;}
.tt{width:44px;height:24px;border-radius:99px;background:var(--acm);position:relative;cursor:pointer;flex-shrink:0;}
.tt.off{background:var(--bds);}
.th{width:20px;height:20px;border-radius:50%;background:#fff;position:absolute;top:2px;right:2px;transition:right .15s;}
.tt.off .th{right:22px;}
.sm{background:var(--sf);border:1px solid var(--bd);border-radius:var(--rl);padding:14px 16px;margin-bottom:1rem;}
.sr{display:flex;justify-content:space-between;font-size:14px;margin-bottom:8px;}
.sl2{color:var(--sc);}
.sv{font-weight:700;}
.sb{width:100%;padding:13px;font-size:16px;font-weight:700;border-radius:var(--r);border:none;background:var(--acm);color:#fff;cursor:pointer;margin-top:4px;font-family:inherit;}
.pr{display:flex;align-items:center;gap:10px;margin-bottom:1.25rem;}
.pw{flex:1;height:6px;background:var(--sub);border-radius:99px;overflow:hidden;}
.pf{height:100%;border-radius:99px;background:var(--acm);transition:width .4s;}
.pt{font-size:12px;color:var(--mt);white-space:nowrap;}
.qm{display:flex;gap:8px;align-items:center;margin-bottom:12px;flex-wrap:wrap;}
.qc{font-size:12px;color:var(--mt);}
.qt{font-size:16px;line-height:1.7;margin-bottom:1.25rem;word-break:break-word;}
.cs{display:flex;flex-direction:column;gap:8px;}
.ch{border:1px solid var(--bd);border-radius:var(--r);padding:10px 14px;cursor:pointer;font-size:15px;text-align:left;background:var(--sf);display:flex;align-items:center;gap:10px;width:100%;font-family:inherit;color:var(--tx);}
.ch.sel{border-color:var(--acm);background:var(--acbg);color:var(--ac);}
.ch.ok2{border-color:var(--ok);background:var(--okbg);color:var(--ok);}
.ch.ng2{border-color:var(--ng);background:var(--ngbg);color:var(--ng);}
.cl2{width:22px;height:22px;border-radius:50%;border:1.5px solid currentColor;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;flex-shrink:0;}
input[type=text]{width:100%;font-size:16px;padding:10px 14px;border-radius:var(--r);border:1px solid var(--bd);font-family:inherit;background:var(--sf);color:var(--tx);margin-bottom:4px;}
input[type=text]:focus{outline:none;border-color:var(--acm);}
input.ok3{border-color:var(--ok);background:var(--okbg);}
input.ng3{border-color:var(--ng);background:var(--ngbg);}
.fb2{border-radius:var(--r);padding:10px 14px;font-size:14px;margin:12px 0;display:none;align-items:center;gap:8px;}
.fb2.ok{background:var(--okbg);color:var(--ok);border:1px solid #C0DD97;display:flex;}
.fb2.ng{background:var(--ngbg);color:var(--ng);border:1px solid #F7C1C1;display:flex;}
.br{display:flex;justify-content:flex-end;margin-top:10px;}
.ab{font-family:inherit;font-size:14px;padding:8px 18px;border-radius:var(--r);border:1px solid var(--bds);background:var(--sf);color:var(--tx);cursor:pointer;}
.cd{background:var(--sf);border:1px solid var(--bd);border-radius:var(--rl);padding:1rem 1.25rem;margin-bottom:12px;}
.rw{text-align:center;padding:2rem 0;}
.ri{width:72px;height:72px;border-radius:50%;background:var(--okbg);color:var(--ok);display:flex;align-items:center;justify-content:center;font-size:32px;margin:0 auto 1rem;}
.rs{font-size:40px;font-weight:700;}
.ru{font-size:14px;color:var(--sc);margin:4px 0 1.5rem;}
.eb{background:var(--wnbg);border-radius:var(--rl);padding:1rem 1.5rem;display:inline-block;margin-bottom:1.5rem;}
.el{font-size:13px;color:var(--wnmd);margin-bottom:4px;}
.ev{font-size:32px;font-weight:700;color:var(--wndk);}
.status{font-size:13px;padding:8px 12px;border-radius:var(--r);margin-bottom:12px;}
.status.ok{background:var(--okbg);color:var(--ok);}
.status.ng{background:var(--ngbg);color:var(--ng);}
.ld{text-align:center;padding:1rem;color:var(--mt);font-size:14px;}
</style>
</head>
<body>

<div class="page on" id="p0">
  <div class="tb">
    <div style="display:flex;align-items:center;gap:10px">
      <div class="av">さく</div>
      <div>
        <div style="font-size:15px;font-weight:600">問題セットを選ぶ</div>
        <div style="font-size:12px;color:var(--mt)">study-fune</div>
      </div>
    </div>
    <div class="pp">
      <i class="ti ti-star" style="font-size:16px;color:#BA7517"></i>
      <span class="pn" id="pt0">0</span>
      <span class="pu">pt</span>
    </div>
  </div>
  <div id="st"></div>
  <p class="sl">教科を選ぶ</p>
  <div class="tabs" id="tabs"><div class="ld">読み込み中...</div></div>
  <p class="sl">問題の種類と問題数</p>
  <div id="cats"><div class="ld">読み込み中...</div></div>
  <p class="sl">難易度</p>
  <div class="dr">
    <button class="db on" id="d0" onclick="tgD(0)">やさしい</button>
    <button class="db on" id="d1" onclick="tgD(1)">ふつう</button>
    <button class="db on" id="d2" onclick="tgD(2)">むずかしい</button>
  </div>
  <div class="tw">
    <div>
      <div style="font-size:14px;font-weight:600">未解答を優先</div>
      <div style="font-size:12px;color:var(--mt)">まだ解いていない問題を優先出題</div>
    </div>
    <div class="tt" id="tg" onclick="tgU()"><div class="th"></div></div>
  </div>
  <div class="sm">
    <div class="sr"><span class="sl2">選択した問題数</span><span class="sv" id="tq">0問</span></div>
    <div class="sr"><span class="sl2">獲得できるポイント（最大）</span><span class="sv" style="color:var(--wndk)" id="tp">0pt</span></div>
    <button class="sb" onclick="go()">この問題セットで始める</button>
  </div>
</div>

<div class="page" id="p1">
  <div class="tb">
    <div style="display:flex;align-items:center;gap:10px">
      <div class="av">さく</div>
      <div>
        <div style="font-size:15px;font-weight:600">田中 さくら</div>
        <div style="font-size:12px;color:var(--mt)">中2 · study-fune</div>
      </div>
    </div>
    <div class="pp">
      <i class="ti ti-star" style="font-size:16px;color:#BA7517"></i>
      <span class="pn" id="pt1">0</span>
      <span class="pu">pt</span>
    </div>
  </div>
  <div class="pr">
    <div class="pw"><div class="pf" id="qprog" style="width:0%"></div></div>
    <span class="pt" id="qnum">1 / 1</span>
  </div>
  <div id="qarea"></div>
</div>

<nav>
  <button class="nb on" id="n0" onclick="sw(0)"><i class="ti ti-pencil"></i></button>
  <button class="nb" id="n1" onclick="sw(1)"><i class="ti ti-player-play"></i></button>
</nav>

<script>
var SURL = "https://nheriakfknzgfmhuncbj.supabase.co";
var SKEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5oZXJpYWtma256Z2ZtaHVuY2JqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI1MjM1NDQsImV4cCI6MjA5ODA5OTU0NH0.lVaGt3sK1rD2AZQuj568h-NCsZQ4tEb_Ff5QFbHEZQU";

var pt = 0;
var si = 0;
var don = [true,true,true];
var uon = true;
var slv = {};
var pool = [];
var qi = 0, qs = 0, qe = 0, qa = false;
var qs2 = [];
var subs = [];
var cmap = {};
var SC = {
  "数学":{ibg:"#E6F1FB",ic:"#185FA5",ico:"ti-calculator"},
  "英語":{ibg:"#E1F5EE",ic:"#0F6E56",ico:"ti-language"},
  "国語":{ibg:"#EEEDFE",ic:"#534AB7",ico:"ti-book"},
  "理科":{ibg:"#FAEEDA",ic:"#854F0B",ico:"ti-flask"},
  "社会":{ibg:"#EAF3DE",ic:"#3B6D11",ico:"ti-world"}
};
var CNT = {};

function sw(i) {
  document.getElementById("p0").classList[i===0?"add":"remove"]("on");
  document.getElementById("p1").classList[i===1?"add":"remove"]("on");
  document.getElementById("n0").classList[i===0?"add":"remove"]("on");
  document.getElementById("n1").classList[i===1?"add":"remove"]("on");
  window.scrollTo(0,0);
}

function load() {
  fetch(SURL+"/rest/v1/questions?is_active=eq.true&order=subject,category,difficulty", {
    headers:{"apikey":SKEY,"Authorization":"Bearer "+SKEY}
  })
  .then(function(r){return r.json();})
  .then(function(d){
    if (!Array.isArray(d)) {
      document.getElementById("st").innerHTML = '<div class="status ng">エラー: '+JSON.stringify(d).slice(0,80)+'</div>';
      document.getElementById("tabs").innerHTML = '<div class="ld">読み込み失敗</div>';
      document.getElementById("cats").innerHTML = '';
      return;
    }
    document.getElementById("st").innerHTML = '<div class="status ok"><i class="ti ti-database"></i> Supabase接続中 · '+d.length+'問読み込み済み</div>';
    qs2 = d;
    subs = []; cmap = {}; CNT = {};
    for (var i=0;i<d.length;i++) {
      var q=d[i];
      if (subs.indexOf(q.subject)<0) subs.push(q.subject);
      var k=q.subject+"__"+q.category;
      if (!cmap[k]) { cmap[k]={subj:q.subject,cat:q.category,qs:[]}; CNT[k]=0; }
      cmap[k].qs.push(q);
    }
    rTabs(); rCats(); rSum();
  })
  .catch(function(e){
    document.getElementById("st").innerHTML = '<div class="status ng">接続失敗: '+e.message+'</div>';
    document.getElementById("tabs").innerHTML = '<div class="ld">読み込み失敗</div>';
  });
}

function rTabs() {
  var h="";
  for (var i=0;i<subs.length;i++)
    h+='<button class="tab'+(i===si?" on":"")+'" onclick="selS('+i+')">'+subs[i]+'</button>';
  document.getElementById("tabs").innerHTML = h;
  document.getElementById("pt0").textContent = pt;
  document.getElementById("pt1").textContent = pt;
}

function selS(i) { si=i; rTabs(); rCats(); }

function rCats() {
  var h="";
  for (var k in cmap) {
    if (cmap[k].subj !== subs[si]) continue;
    var c=cmap[k], av=0;
    for (var j=0;j<c.qs.length;j++) if (don[c.qs[j].difficulty]) av++;
    var sc=SC[c.subj]||{ibg:"#eee",ic:"#333",ico:"ti-help"};
    var id="cv_"+k.replace(/[^a-zA-Z0-9]/g,"_");
    h+='<div class="cr">'+
      '<div class="ci" style="background:'+sc.ibg+';color:'+sc.ic+'"><i class="ti '+sc.ico+'"></i></div>'+
      '<div class="cb"><div class="cn">'+c.cat+'</div><div class="cm">'+av+'問ストック</div></div>'+
      '<div class="cc">'+
        '<button class="cb2" onclick="chg(''+k+'',-1)">−</button>'+
        '<span class="cv" id="'+id+'">'+CNT[k]+'</span>'+
        '<button class="cb2" onclick="chg(''+k+'',1)">＋</button>'+
      '</div></div>';
  }
  document.getElementById("cats").innerHTML = h || '<div class="ld">カテゴリなし</div>';
}

function chg(k,d) {
  var c=cmap[k], av=0;
  for (var j=0;j<c.qs.length;j++) if (don[c.qs[j].difficulty]) av++;
  CNT[k]=Math.max(0,Math.min(av,(CNT[k]||0)+d));
  var id="cv_"+k.replace(/[^a-zA-Z0-9]/g,"_");
  var el=document.getElementById(id);
  if (el) el.textContent=CNT[k];
  rSum();
}

function tgD(i) {
  don[i]=!don[i];
  document.getElementById("d"+i).classList[don[i]?"add":"remove"]("on");
  rCats(); rSum();
}

function tgU() {
  uon=!uon;
  document.getElementById("tg").classList[uon?"remove":"add"]("off");
}

function rSum() {
  var tot=0, tp=0;
  for (var k in CNT) {
    tot+=CNT[k];
    var qs3=cmap[k].qs.filter(function(q){return don[q.difficulty];});
    var avg=qs3.length?qs3.reduce(function(a,q){return a+q.points;},0)/qs3.length:0;
    tp+=Math.round(avg*CNT[k]);
  }
  document.getElementById("tq").textContent=tot+"問";
  document.getElementById("tp").textContent=tp+"pt";
}

function go() {
  pool=[];
  for (var k in CNT) {
    var cnt=CNT[k]; if (!cnt) continue;
    var c=cmap[k];
    var sc=SC[c.subj]||{ibg:"#eee",ic:"#333"};
    var arr=c.qs.filter(function(q){return don[q.difficulty];}).map(function(q,idx){
      return {id:q.id,t:q.type,pts:q.points,tx:q.text,ch:q.choices,a:q.answer,h:q.hint,
              subj:q.subject,ibg:sc.ibg,ic:sc.ic};
    });
    if (uon) { var un=arr.filter(function(q){return !slv[q.id];}); if (un.length>=cnt) arr=un; }
    arr.sort(function(){return Math.random()-.5;});
    for (var j=0;j<Math.min(cnt,arr.length);j++) pool.push(arr[j]);
  }
  if (!pool.length) { alert("問題が選択されていません。\n各カテゴリの「＋」で問題数を追加してください。"); return; }
  pool.sort(function(){return Math.random()-.5;});
  qi=0; qs=0; qe=0; qa=false;
  rQ(); sw(1);
}

function rQ() {
  if (qi>=pool.length) { rRes(); return; }
  var q=pool[qi];
  document.getElementById("qprog").style.width=Math.round(qi/pool.length*100)+"%";
  document.getElementById("qnum").textContent=(qi+1)+" / "+pool.length;
  var bc="background:"+q.ibg+";color:"+q.ic;
  var ch=typeof q.ch==="string"?JSON.parse(q.ch):(q.ch||[]);
  var h='<div class="cd"><div class="qm"><span style="font-size:11px;padding:2px 9px;border-radius:20px;font-weight:600;'+bc+'">'+q.subj+'</span>'+
    '<span class="qc">'+q.pts+'pt 獲得チャンス</span></div>'+
    '<p class="qt">'+q.tx.replace(/\n/g,"<br>")+'</p>';
  if (q.t==="choice") {
    h+='<div class="cs">';
    var L=["A","B","C","D"];
    for (var i=0;i<ch.length;i++)
      h+='<button class="ch" id="c'+i+'" onclick="pk('+i+')"><span class="cl2">'+L[i]+'</span>'+ch[i]+'</button>';
    h+='</div>';
  } else {
    h+='<input type="text" id="ti" placeholder="'+(q.h||"")+'">';
  }
  h+='<div class="fb2" id="fb"></div><div class="br"><button class="ab" id="sb" onclick="sub()">答えを確認</button></div></div>';
  document.getElementById("qarea").innerHTML=h;
  qa=false;
}

function pk(i) {
  if (qa) return;
  document.querySelectorAll(".ch").forEach(function(b){b.classList.remove("sel");});
  document.getElementById("c"+i).classList.add("sel");
}

function sub() {
  if (qa) { qi++; rQ(); return; }
  var q=pool[qi]; qa=true;
  var ok=false;
  var ch=typeof q.ch==="string"?JSON.parse(q.ch):(q.ch||[]);
  if (q.t==="choice") {
    var sel=-1;
    document.querySelectorAll(".ch").forEach(function(b,i){if(b.classList.contains("sel"))sel=i;});
    if (sel<0) return;
    ok=(String(sel)===String(q.a));
    document.querySelectorAll(".ch").forEach(function(b,i){
      if(String(i)===String(q.a))b.classList.add("ok2");
      else if(b.classList.contains("sel"))b.classList.add("ng2");
    });
  } else {
    var inp=document.getElementById("ti");
    ok=inp.value.trim().toLowerCase()===q.a.toLowerCase();
    inp.className=ok?"ok3":"ng3"; inp.disabled=true;
  }
  slv[q.id]=true;
  var fb=document.getElementById("fb");
  if (ok) {
    qs++; qe+=q.pts; pt+=q.pts;
    document.getElementById("pt0").textContent=pt;
    document.getElementById("pt1").textContent=pt;
    fb.className="fb2 ok";
    fb.innerHTML='<i class="ti ti-circle-check" style="font-size:18px"></i>正解！ +'+q.pts+'pt';
  } else {
    fb.className="fb2 ng";
    var ans=q.t==="choice"?ch[parseInt(q.a)]:q.a;
    fb.innerHTML='<i class="ti ti-circle-x" style="font-size:18px"></i>正解は「'+ans+'」';
  }
  document.getElementById("sb").textContent="次の問題へ";
}

function rRes() {
  document.getElementById("qprog").style.width="100%";
  document.getElementById("qnum").textContent=pool.length+" / "+pool.length;
  var pct=Math.round(qs/pool.length*100);
  document.getElementById("qarea").innerHTML=
    '<div class="rw">'+
    '<div class="ri"><i class="ti ti-trophy" style="font-size:32px"></i></div>'+
    '<div class="rs">'+qs+' / '+pool.length+' 問正解</div>'+
    '<div class="ru">正答率 '+pct+'%</div>'+
    '<div class="eb"><div class="el">今回獲得したポイント</div><div class="ev">+'+qe+' pt</div></div><br>'+
    '<button class="ab" onclick="sw(0)">問題セット選択に戻る</button>'+
    '</div>';
}

load();
</script>
</body>
</html>
