<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>study-fune</title>
<style>
body{font-family:-apple-system,sans-serif;background:#F5F5F3;margin:0;padding:0;}
.wrap{max-width:500px;margin:0 auto;padding:1rem 1rem 5rem;}
.page{display:none;}.page.on{display:block;}
nav{position:fixed;bottom:0;left:0;right:0;height:52px;background:#fff;border-top:1px solid #E5E5E3;display:flex;}
.nb{flex:1;font-size:20px;border:none;background:none;color:#9A9A98;cursor:pointer;font-family:inherit;}
.nb.on{color:#378ADD;}
.topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
.ptpill{background:#FAEEDA;border-radius:20px;padding:5px 14px;font-size:18px;font-weight:700;color:#633806;}
.status{padding:8px 12px;border-radius:8px;font-size:13px;margin-bottom:12px;}
.ok-s{background:#EAF3DE;color:#3B6D11;}.ng-s{background:#FCEBEB;color:#A32D2D;}
h2{font-size:15px;font-weight:600;margin:0 0 10px;}
.tabs{display:flex;gap:6px;overflow-x:auto;margin-bottom:12px;padding-bottom:2px;}
.tabs::-webkit-scrollbar{display:none;}
.tab{padding:6px 14px;border-radius:20px;border:1px solid #E5E5E3;background:#fff;font-size:13px;font-weight:600;color:#666;cursor:pointer;white-space:nowrap;font-family:inherit;}
.tab.on{background:#378ADD;color:#fff;border-color:#378ADD;}
.cat{background:#fff;border:1px solid #E5E5E3;border-radius:10px;padding:10px 14px;margin-bottom:8px;display:flex;align-items:center;justify-content:space-between;}
.cat-name{font-size:14px;font-weight:600;}.cat-sub{font-size:12px;color:#9A9A98;margin-top:2px;}
.ctr{display:flex;align-items:center;gap:8px;}
.cbtn{width:30px;height:30px;border-radius:50%;border:1px solid #E5E5E3;background:#fff;font-size:18px;font-weight:700;cursor:pointer;font-family:inherit;display:flex;align-items:center;justify-content:center;}
.cval{font-size:16px;font-weight:700;min-width:20px;text-align:center;}
.sum{background:#fff;border:1px solid #E5E5E3;border-radius:10px;padding:12px 14px;margin-top:12px;}
.sr{display:flex;justify-content:space-between;font-size:14px;margin-bottom:6px;}
.sbtn{width:100%;padding:13px;font-size:16px;font-weight:700;border-radius:8px;border:none;background:#378ADD;color:#fff;cursor:pointer;font-family:inherit;margin-top:8px;}
.prog{display:flex;align-items:center;gap:8px;margin-bottom:12px;}
.pb{flex:1;height:6px;background:#F0F0EE;border-radius:99px;overflow:hidden;}
.pf{height:100%;border-radius:99px;background:#378ADD;}
.ptxt{font-size:12px;color:#9A9A98;}
.card{background:#fff;border:1px solid #E5E5E3;border-radius:10px;padding:1rem;margin-bottom:10px;}
.badge{font-size:11px;padding:2px 9px;border-radius:20px;font-weight:600;display:inline-block;margin-bottom:10px;}
.qtext{font-size:16px;line-height:1.7;margin-bottom:14px;word-break:break-word;}
.choices{display:flex;flex-direction:column;gap:8px;}
.ch{border:1px solid #E5E5E3;border-radius:8px;padding:10px 14px;font-size:15px;text-align:left;background:#fff;display:flex;align-items:center;gap:10px;width:100%;font-family:inherit;color:#1A1A18;cursor:pointer;}
.ch.sel{border-color:#378ADD;background:#E6F1FB;color:#185FA5;}
.ch.ok2{border-color:#3B6D11;background:#EAF3DE;color:#3B6D11;}
.ch.ng2{border-color:#A32D2D;background:#FCEBEB;color:#A32D2D;}
.cl{width:22px;height:22px;border-radius:50%;border:1.5px solid currentColor;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;flex-shrink:0;}
input[type=text]{width:100%;font-size:16px;padding:10px 14px;border-radius:8px;border:1px solid #E5E5E3;font-family:inherit;margin-bottom:4px;}
input.ok3{border-color:#3B6D11;background:#EAF3DE;}input.ng3{border-color:#A32D2D;background:#FCEBEB;}
.fb{padding:10px 14px;border-radius:8px;font-size:14px;margin:10px 0;display:none;align-items:center;gap:8px;}
.fb.ok{background:#EAF3DE;color:#3B6D11;border:1px solid #C0DD97;display:flex;}
.fb.ng{background:#FCEBEB;color:#A32D2D;border:1px solid #F7C1C1;display:flex;}
.br{display:flex;justify-content:flex-end;margin-top:8px;}
.abtn{font-size:14px;padding:8px 18px;border-radius:8px;border:1px solid #CCCCCA;background:#fff;cursor:pointer;font-family:inherit;}
.result{text-align:center;padding:2rem 0;}
.earn{background:#FAEEDA;border-radius:10px;padding:1rem 1.5rem;display:inline-block;margin:1rem 0;}
.ld{text-align:center;padding:1rem;color:#9A9A98;font-size:14px;}
</style>
</head>
<body>
<div class="wrap">

<div class="page on" id="p0">
  <div class="topbar">
    <div>
      <div style="font-size:15px;font-weight:600">問題セットを選ぶ</div>
      <div style="font-size:12px;color:#9A9A98">study-fune</div>
    </div>
    <div class="ptpill"><span id="ptd">0</span> pt</div>
  </div>
  <div id="st"></div>
  <h2>教科を選ぶ</h2>
  <div class="tabs" id="tabs"><div class="ld">読み込み中...</div></div>
  <h2>問題の種類と問題数</h2>
  <div id="cats"><div class="ld">読み込み中...</div></div>
  <div class="sum">
    <div class="sr"><span style="color:#666">選択した問題数</span><span id="tq" style="font-weight:700">0問</span></div>
    <div class="sr"><span style="color:#666">獲得ポイント（最大）</span><span id="tp" style="font-weight:700;color:#633806">0pt</span></div>
    <button class="sbtn" onclick="startQuiz()">この問題セットで始める</button>
  </div>
</div>

<div class="page" id="p1">
  <div class="topbar">
    <div>
      <div style="font-size:15px;font-weight:600">演習中</div>
      <div style="font-size:12px;color:#9A9A98">study-fune</div>
    </div>
    <div class="ptpill"><span id="ptq">0</span> pt</div>
  </div>
  <div class="prog">
    <div class="pb"><div class="pf" id="qprog" style="width:0%"></div></div>
    <span class="ptxt" id="qnum">1/1</span>
  </div>
  <div id="qarea"></div>
</div>

</div>

<nav>
  <button class="nb on" id="n0" onclick="sw(0)">✑</button>
  <button class="nb" id="n1" onclick="sw(1)">▶</button>
</nav>

<script>
var SURL="https://nheriakfknzgfmhuncbj.supabase.co";
var SKEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5oZXJpYWtma256Z2ZtaHVuY2JqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI1MjM1NDQsImV4cCI6MjA5ODA5OTU0NH0.lVaGt3sK1rD2AZQuj568h-NCsZQ4tEb_Ff5QFbHEZQU";
var pt=0,si=0,slv={},pool=[],qi=0,qsc=0,qe=0,qa=false,subs=[],cmap={},CNT={};
var SC={"数学":["#E6F1FB","#185FA5"],"英語":["#E1F5EE","#0F6E56"],"国語":["#EEEDFE","#534AB7"],"理科":["#FAEEDA","#854F0B"],"社会":["#EAF3DE","#3B6D11"]};

function sw(i){["p0","p1"].forEach(function(id,j){document.getElementById(id).classList[i===j?"add":"remove"]("on");});["n0","n1"].forEach(function(id,j){document.getElementById(id).classList[i===j?"add":"remove"]("on");});window.scrollTo(0,0);}
function rTabs(){var h="";for(var i=0;i<subs.length;i++)h+='<button class="tab'+(i===si?" on":"")+'" onclick="selS('+i+')">'+subs[i]+"</button>";document.getElementById("tabs").innerHTML=h;}
function selS(i){si=i;rTabs();rCats();}
function rCats(){var h="";for(var k in cmap){if(cmap[k].subj!==subs[si])continue;var c=cmap[k],eid="e_"+k.replace(/[^a-z0-9]/gi,"X");h+='<div class="cat"><div><div class="cat-name">'+c.cat+'</div><div class="cat-sub">'+c.qs.length+'問ストック</div></div><div class="ctr"><button class="cbtn" onclick="chg(''+k+'',-1)">−</button><span class="cval" id="'+eid+'">'+(CNT[k]||0)+'</span><button class="cbtn" onclick="chg(''+k+'',1)">＋</button></div></div>';}document.getElementById("cats").innerHTML=h||'<div class="ld">なし</div>';}
function chg(k,d){CNT[k]=Math.max(0,Math.min(cmap[k].qs.length,(CNT[k]||0)+d));var el=document.getElementById("e_"+k.replace(/[^a-z0-9]/gi,"X"));if(el)el.textContent=CNT[k];rSum();}
function rSum(){var tot=0,tp=0;for(var k in CNT){tot+=CNT[k];var avg=cmap[k].qs.reduce(function(a,q){return a+q.points;},0)/Math.max(cmap[k].qs.length,1);tp+=Math.round(avg*CNT[k]);}document.getElementById("tq").textContent=tot+"問";document.getElementById("tp").textContent=tp+"pt";}
function startQuiz(){pool=[];for(var k in CNT){var cnt=CNT[k];if(!cnt)continue;var c=cmap[k],arr=c.qs.map(function(q){return{id:q.id,t:q.type,pts:q.points,tx:q.text,ch:q.choices,a:q.answer,h:q.hint,subj:c.subj};});var un=arr.filter(function(q){return !slv[q.id];});if(un.length>=cnt)arr=un;arr.sort(function(){return Math.random()-.5;});for(var j=0;j<Math.min(cnt,arr.length);j++)pool.push(arr[j]);}if(!pool.length){alert("問題を選んでください");return;}pool.sort(function(){return Math.random()-.5;});qi=0;qsc=0;qe=0;qa=false;rQ();sw(1);}
function rQ(){if(qi>=pool.length){rRes();return;}var q=pool[qi];document.getElementById("qprog").style.width=Math.round(qi/pool.length*100)+"%";document.getElementById("qnum").textContent=(qi+1)+"/"+pool.length;var sc=SC[q.subj]||["#eee","#333"],ch=typeof q.ch==="string"?JSON.parse(q.ch):(q.ch||[]);var h='<div class="card"><span class="badge" style="background:'+sc[0]+';color:'+sc[1]+'">'+q.subj+'</span><div class="qtext">'+q.tx.replace(/
/g,"<br>")+"</div>";if(q.t==="choice"){h+='<div class="choices">';["A","B","C","D"].forEach(function(l,i){h+='<button class="ch" id="c'+i+'" onclick="pk('+i+')"><span class="cl">'+l+"</span>"+ch[i]+"</button>";});h+="</div>";}else{h+='<input type="text" id="ti" placeholder="'+(q.h||"")+'">';}h+='<div class="fb" id="fb"></div><div class="br"><button class="abtn" id="sb" onclick="subQ()">答えを確認</button></div></div>';document.getElementById("qarea").innerHTML=h;qa=false;}
function pk(i){if(qa)return;document.querySelectorAll(".ch").forEach(function(b){b.classList.remove("sel");});document.getElementById("c"+i).classList.add("sel");}
function subQ(){if(qa){qi++;rQ();return;}var q=pool[qi];qa=true;var ok=false,ch=typeof q.ch==="string"?JSON.parse(q.ch):(q.ch||[]);if(q.t==="choice"){var sel=-1;document.querySelectorAll(".ch").forEach(function(b,i){if(b.classList.contains("sel"))sel=i;});if(sel<0)return;ok=(String(sel)===String(q.a));document.querySelectorAll(".ch").forEach(function(b,i){if(String(i)===String(q.a))b.classList.add("ok2");else if(b.classList.contains("sel"))b.classList.add("ng2");});}else{var inp=document.getElementById("ti");ok=inp.value.trim().toLowerCase()===q.a.toLowerCase();inp.className=ok?"ok3":"ng3";inp.disabled=true;}slv[q.id]=true;var fb=document.getElementById("fb");if(ok){qsc++;qe+=q.pts;pt+=q.pts;document.getElementById("ptd").textContent=pt;document.getElementById("ptq").textContent=pt;fb.className="fb ok";fb.innerHTML="✓ 正解！ +"+q.pts+"pt";}else{fb.className="fb ng";fb.innerHTML="✗ 正解は「"+(q.t==="choice"?ch[parseInt(q.a)]:q.a)+"」";}document.getElementById("sb").textContent="次の問題へ";}
function rRes(){document.getElementById("qprog").style.width="100%";document.getElementById("qnum").textContent=pool.length+"/"+pool.length;var pct=Math.round(qsc/pool.length*100);document.getElementById("qarea").innerHTML='<div class="result"><div style="font-size:48px">&#x1F3C6;</div><div style="font-size:36px;font-weight:700">'+qsc+"/"+pool.length+"問正解</div><div style='font-size:14px;color:#666;margin:4px 0 1rem'>正答率 "+pct+'%</div><div class="earn"><div style="font-size:13px;color:#854F0B;margin-bottom:4px">今回獲得ポイント</div><div style="font-size:32px;font-weight:700;color:#633806">+'+qe+' pt</div></div><br><button class="abtn" onclick="sw(0)">選択画面に戻る</button></div>';}

fetch(SURL+"/rest/v1/questions?is_active=eq.true&order=subject,category,difficulty",{headers:{"apikey":SKEY,"Authorization":"Bearer "+SKEY}})
.then(function(r){return r.json();})
.then(function(data){
  if(!Array.isArray(data)){document.getElementById("st").innerHTML='<div class="status ng-s">エラー: '+JSON.stringify(data).slice(0,80)+"</div>";document.getElementById("tabs").innerHTML='<div class="ld">失敗</div>';document.getElementById("cats").innerHTML="";return;}
  document.getElementById("st").innerHTML='<div class="status ok-s">Supabase接続中 · '+data.length+"問読み込み済み</div>";
  subs=[];cmap={};CNT={};
  for(var i=0;i<data.length;i++){var q=data[i];if(subs.indexOf(q.subject)<0)subs.push(q.subject);var k=q.subject+"__"+q.category;if(!cmap[k]){cmap[k]={subj:q.subject,cat:q.category,qs:[]};CNT[k]=0;}cmap[k].qs.push(q);}
  rTabs();rCats();rSum();
})
.catch(function(e){document.getElementById("st").innerHTML='<div class="status ng-s">接続失敗: '+e.message+"</div>";document.getElementById("tabs").innerHTML='<div class="ld">失敗</div>';});
</script>
</body>
</html>
